<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galaxy AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0d1121;--surface2:#131929;
  --border:rgba(120,150,255,0.13);--border2:rgba(120,150,255,0.25);
  --text:#dde4f5;--muted:#6a7898;--accent:#6b8fff;--accent2:#9b6bff;
  --green:#22c55e;--radius:16px;--rsm:10px;--font:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 62%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 67% 12%,rgba(200,210,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 83% 72%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 88%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 42%,rgba(200,210,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 91% 33%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 8% 52%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 88%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 46% 8%,rgba(180,200,255,.3) 0%,transparent 100%);
}
header{position:relative;z-index:10;display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:.5px solid var(--border);background:rgba(7,9,15,.9);backdrop-filter:blur(14px);flex-shrink:0}
.hd-info h1{font-size:15px;font-weight:700;color:var(--text)}
.hd-info p{font-size:11px;color:var(--muted);margin-top:1px}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.clock-display{font-size:12px;color:var(--accent);font-weight:500;background:rgba(107,143,255,.1);padding:4px 10px;border-radius:20px;border:.5px solid var(--border2)}
.clear-btn{padding:5px 11px;border:.5px solid var(--border2);border-radius:var(--rsm);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}
.clear-btn:hover{border-color:var(--accent);color:var(--text)}
.status{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 7px #22c55e88;animation:blink 2.5s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}55%{opacity:.35}}

/* Image card */
.img-card{max-width:800px;margin:0 auto;width:100%;animation:up .25s ease}
.img-card .img-wrap{position:relative;border-radius:var(--radius);overflow:hidden;border:.5px solid var(--border2);background:var(--surface2)}
.img-card img{width:100%;display:block;border-radius:var(--radius);max-height:480px;object-fit:cover}
.img-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--muted);font-size:13px}
.img-spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.img-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border:.5px solid var(--border2);border-top:none;border-radius:0 0 var(--radius) var(--radius)}
.img-prompt-text{font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-actions{display:flex;gap:6px;flex-shrink:0}
.img-btn{padding:5px 10px;border:.5px solid var(--border2);border-radius:var(--rsm);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.img-btn:hover{border-color:var(--accent);color:var(--text)}

/* Weather card */
.weather-card{max-width:800px;margin:0 auto;width:100%;background:linear-gradient(135deg,#0d1535,#111830);border:.5px solid var(--border2);border-radius:var(--radius);padding:16px 20px;animation:up .25s ease}
.weather-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.weather-city{font-size:18px;font-weight:700;color:var(--text)}
.weather-desc{font-size:13px;color:var(--muted);margin-top:2px}
.weather-temp{font-size:42px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.weather-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.weather-stat{background:rgba(107,143,255,.07);border-radius:var(--rsm);padding:8px 10px;border:.5px solid var(--border)}
.weather-stat .label{font-size:10px;color:var(--muted);margin-bottom:2px}
.weather-stat .val{font-size:14px;font-weight:600;color:var(--text)}

#chat{position:relative;z-index:5;flex:1;overflow-y:auto;padding:20px 16px 12px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.msg{display:flex;align-items:flex-start;gap:10px;max-width:800px;margin:0 auto;width:100%;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;overflow:hidden}
.av.user{background:linear-gradient(135deg,#1a2a5a,#202840);border:.5px solid var(--border2);font-size:13px;font-weight:700;color:var(--accent)}
.bubble{padding:11px 15px;border-radius:var(--radius);font-size:14px;line-height:1.7;max-width:calc(100% - 46px);word-break:break-word}
.msg.user .bubble{background:var(--surface2);border:.5px solid var(--border2);border-top-right-radius:4px}
.msg.ai .bubble{background:var(--surface);border:.5px solid var(--border);border-top-left-radius:4px}
.bubble p{margin-bottom:8px}.bubble p:last-child{margin-bottom:0}
.bubble strong{font-weight:600;color:#c5d0f0}
.bubble em{font-style:italic;color:#aab8de}
.bubble h3{font-size:15px;font-weight:600;color:#c5d0f0;margin:10px 0 6px}
.bubble code{background:rgba(107,143,255,.13);padding:2px 6px;border-radius:5px;font-family:monospace;font-size:13px;color:#93bbfd}
.bubble pre{background:#060a16;border:.5px solid var(--border);border-radius:var(--rsm);padding:12px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.5}
.bubble pre code{background:none;padding:0;color:#d4dff7}
.bubble ul,.bubble ol{padding-left:20px;margin-bottom:8px}
.bubble li{margin-bottom:4px}
.typing{display:flex;gap:5px;align-items:center;padding:12px 15px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-6px);opacity:1}}

.welcome{text-align:center;padding:24px 16px 16px;max-width:500px;margin:auto}
.big-av{width:80px;height:80px;margin:0 auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(130deg,#c5d5ff 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:4px}
.caps{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0}
.cap{padding:5px 12px;border:.5px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--muted);font-size:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:12px}
.chip{padding:8px 13px;border:.5px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.chip:hover{border-color:var(--accent);color:var(--text);background:rgba(107,143,255,.09)}

footer{position:relative;z-index:10;padding:10px 14px 16px;border-top:.5px solid var(--border);background:rgba(7,9,15,.93);backdrop-filter:blur(14px);flex-shrink:0}
.input-row{display:flex;gap:9px;align-items:flex-end;max-width:800px;margin:0 auto}
#msg{flex:1;background:var(--surface);border:.5px solid var(--border2);border-radius:var(--radius);padding:11px 15px;font-size:14px;color:var(--text);font-family:var(--font);resize:none;outline:none;line-height:1.5;max-height:150px;overflow-y:auto;transition:border-color .15s}
#msg::placeholder{color:var(--muted)}
#msg:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:8px;align-items:center;flex-shrink:0;align-self:flex-end}
#send{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s}
#send:hover{opacity:.82}#send:active{transform:scale(.91)}#send:disabled{opacity:.3;cursor:not-allowed}
#imgbtn{width:44px;height:44px;border-radius:50%;border:.5px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
#imgbtn:hover{border-color:var(--accent2);color:var(--accent2)}
#imgbtn:disabled{opacity:.3;cursor:not-allowed}
.ft-meta{display:flex;align-items:center;justify-content:space-between;max-width:800px;margin:6px auto 0}
.ft-note{font-size:11px;color:var(--muted)}
.ft-right{display:flex;align-items:center;gap:8px}
.mode-badge{font-size:11px;padding:3px 8px;border-radius:10px;border:.5px solid var(--border2);color:var(--muted)}
.mode-badge.img-mode{border-color:var(--accent2);color:var(--accent2);background:rgba(155,107,255,.08)}
.model-sel{background:transparent;border:none;padding:2px 4px;font-size:11px;color:var(--muted);font-family:var(--font);outline:none;cursor:pointer}
.model-sel option{background:#131929;color:var(--text)}
.err-bar{background:rgba(220,50,50,.1);border:.5px solid rgba(220,50,50,.28);border-radius:var(--rsm);padding:9px 14px;font-size:13px;color:#f8a0a0;max-width:800px;margin:0 auto 4px;animation:up .2s ease}
@media(max-width:600px){header{padding:10px 12px}#chat{padding:14px 10px 10px}footer{padding:8px 10px 14px}.weather-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="stars"></div>

<header>
  <svg width="36" height="36" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;border-radius:50%">
    <defs>
      <radialGradient id="hbg" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#1a2f80"/><stop offset="100%" stop-color="#070a20"/></radialGradient>
      <radialGradient id="hcore" cx="40%" cy="38%" r="60%"><stop offset="0%" stop-color="#b0ccff"/><stop offset="100%" stop-color="#3050cc"/></radialGradient>
      <radialGradient id="hglow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#6080ff" stop-opacity="0.5"/><stop offset="100%" stop-color="#6080ff" stop-opacity="0"/></radialGradient>
    </defs>
    <circle cx="19" cy="19" r="19" fill="url(#hbg)"/>
    <circle cx="19" cy="19" r="13" fill="url(#hglow)"/>
    <circle cx="19" cy="19" r="6" fill="url(#hcore)"/>
    <circle cx="19" cy="19" r="3.5" fill="#c0d4ff" opacity="0.9"/>
    <circle cx="19" cy="19" r="1.5" fill="white"/>
    <ellipse cx="19" cy="19" rx="13" ry="4" fill="none" stroke="#6080ff" stroke-width="0.9" opacity="0.6" transform="rotate(-30 19 19)"/>
    <circle cx="8" cy="10" r="1" fill="white" opacity="0.8"/>
    <circle cx="30" cy="8" r="0.7" fill="#c0d0ff" opacity="0.9"/>
    <circle cx="29" cy="28" r="0.9" fill="white" opacity="0.7"/>
    <circle cx="9" cy="27" r="0.7" fill="#c0d0ff" opacity="0.6"/>
  </svg>
  <div class="hd-info">
    <h1>Galaxy AI</h1>
    <p>Chat · Images · Weather · Always Online</p>
  </div>
  <div class="hd-right">
    <div class="clock-display" id="clock">--:--</div>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
    <div class="status" id="status"></div>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="big-av">
      <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="wbg" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#1e3590"/><stop offset="100%" stop-color="#060a1e"/></radialGradient>
          <radialGradient id="wglow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#5878ff" stop-opacity="0.6"/><stop offset="100%" stop-color="#5878ff" stop-opacity="0"/></radialGradient>
          <radialGradient id="wcore" cx="40%" cy="38%" r="60%"><stop offset="0%" stop-color="#b0ccff"/><stop offset="100%" stop-color="#3055cc"/></radialGradient>
        </defs>
        <circle cx="40" cy="40" r="40" fill="url(#wbg)"/>
        <circle cx="40" cy="40" r="28" fill="url(#wglow)"/>
        <circle cx="40" cy="40" r="14" fill="url(#wcore)"/>
        <circle cx="40" cy="40" r="8" fill="#d0e4ff" opacity="0.85"/>
        <circle cx="40" cy="40" r="3.5" fill="white"/>
        <ellipse cx="40" cy="40" rx="26" ry="8" fill="none" stroke="#5878ff" stroke-width="1.4" opacity="0.55" transform="rotate(-32 40 40)"/>
        <ellipse cx="40" cy="40" rx="20" ry="6" fill="none" stroke="#8090ff" stroke-width="0.8" opacity="0.3" transform="rotate(48 40 40)"/>
        <circle cx="14" cy="18" r="1.8" fill="white" opacity="0.85"/>
        <circle cx="64" cy="14" r="1.2" fill="#c8d8ff" opacity="0.9"/>
        <circle cx="62" cy="60" r="1.6" fill="white" opacity="0.75"/>
        <circle cx="16" cy="60" r="1.2" fill="#c8d8ff" opacity="0.65"/>
      </svg>
    </div>
    <h2>Galaxy AI</h2>
    <p>Chat, generate images, check weather — all in one place.</p>
    <div class="caps">
      <span class="cap">⚡ Instant replies</span>
      <span class="cap">🎨 AI Image Generator</span>
      <span class="cap">🌤️ Live weather</span>
      <span class="cap">🕐 Knows the time</span>
      <span class="cap">♾️ No limits</span>
      <span class="cap">💻 Writes code</span>
    </div>
    <div class="chips">
      <button class="chip" onclick="suggest('What time is it right now?')">🕐 Current time</button>
      <button class="chip" onclick="suggest('Weather in Lagos')">🌤️ Weather in Lagos</button>
      <button class="chip" onclick="generateImage('a galaxy with colorful nebula and stars, ultra realistic')">🎨 Generate a galaxy</button>
      <button class="chip" onclick="generateImage('a futuristic city at night with neon lights, cinematic')">🏙️ Futuristic city</button>
      <button class="chip" onclick="suggest('Write me a Python calculator')">💻 Python code</button>
      <button class="chip" onclick="suggest('Tell me something amazing about the universe')">🌌 Universe fact</button>
    </div>
  </div>
</div>

<div id="errs"></div>

<footer>
  <div class="input-row">
    <textarea id="msg" placeholder="Chat, ask anything, or describe an image to generate…" rows="1" autocomplete="off" spellcheck="true"></textarea>
    <div class="btn-row">
      <button id="imgbtn" onclick="triggerImageGen()" title="Generate Image 🎨">🎨</button>
      <button id="send" onclick="send()" aria-label="Send">&#9658;</button>
    </div>
  </div>
  <div class="ft-meta">
    <span class="ft-note" id="ft-note">Galaxy AI · No limits · Always fast</span>
    <div class="ft-right">
      <span class="mode-badge" id="mode-badge">💬 Chat</span>
      <select class="model-sel" id="msel">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B ⚡</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      </select>
    </div>
  </div>
</footer>

<script>
const HIST='galaxy_hist';
let history=[],busy=false,imgMode=false;
const chatEl=document.getElementById('chat');
const msgEl=document.getElementById('msg');
const sendBtn=document.getElementById('send');
const imgBtn=document.getElementById('imgbtn');
const msel=document.getElementById('msel');
const errs=document.getElementById('errs');
const statusEl=document.getElementById('status');
const modeBadge=document.getElementById('mode-badge');
const ftNote=document.getElementById('ft-note');

// Live clock
function updateClock(){
  const now=new Date();
  const h=now.getHours().toString().padStart(2,'0');
  const m=now.getMinutes().toString().padStart(2,'0');
  const s=now.getSeconds().toString().padStart(2,'0');
  document.getElementById('clock').textContent=`${h}:${m}:${s}`;
}
updateClock();setInterval(updateClock,1000);

// Toggle image mode
function triggerImageGen(){
  imgMode=!imgMode;
  if(imgMode){
    modeBadge.textContent='🎨 Image Mode';
    modeBadge.className='mode-badge img-mode';
    msgEl.placeholder='Describe the image you want to generate…';
    ftNote.textContent='Tip: Be descriptive! e.g. "a lion on a mountain at sunset, realistic"';
    imgBtn.style.borderColor='var(--accent2)';
    imgBtn.style.color='var(--accent2)';
  } else {
    modeBadge.textContent='💬 Chat';
    modeBadge.className='mode-badge';
    msgEl.placeholder='Chat, ask anything, or describe an image to generate…';
    ftNote.textContent='Galaxy AI · No limits · Always fast';
    imgBtn.style.borderColor='';
    imgBtn.style.color='';
  }
  msgEl.focus();
}

// Detect auto image requests
function isImageRequest(txt){
  return /^(generate|create|make|draw|paint|show|give me|produce|design|render|imagine)\s+(me\s+)?(a|an|the|some)?\s*(image|picture|photo|art|illustration|painting|drawing|wallpaper|portrait|landscape|poster|logo|icon)/i.test(txt)
    || /^(image|picture|photo)\s+of/i.test(txt);
}

function extractImagePrompt(txt){
  return txt.replace(/^(generate|create|make|draw|paint|show me|give me|produce|design|render|imagine)\s+(me\s+)?(a|an|the|some)?\s*(image|picture|photo|art|illustration|painting|drawing|wallpaper|portrait|landscape|poster|logo|icon)\s*(of\s*)?/i,'').trim() || txt;
}

// Weather helpers
function isWeatherQuery(txt){return /weather|temperature|temp|how hot|how cold|raining|forecast/i.test(txt);}
function extractCity(txt){
  const m=txt.match(/(?:weather|temp(?:erature)?|forecast)\s+(?:in|at|for|of)?\s+([a-zA-Z\s]+)/i);
  if(m)return m[1].trim();
  const m2=txt.match(/(?:in|at|for)\s+([a-zA-Z\s]+)/i);
  if(m2)return m2[1].trim();
  return null;
}

function init(){
  try{
    const h=JSON.parse(localStorage.getItem(HIST)||'[]');
    if(h.length){history=h;document.getElementById('welcome')?.remove();history.forEach(m=>addBubble(m.content,m.role==='user'?'user':'ai',false));chatEl.scrollTop=chatEl.scrollHeight;}
  }catch(e){}
}

function clearChat(){history=[];localStorage.removeItem(HIST);location.reload();}
function suggest(t){msgEl.value=t;imgMode=false;send();}

function generateImage(prompt){
  document.getElementById('welcome')?.remove();
  addBubble('🎨 Generate: '+prompt,'user');
  doGenerateImage(prompt);
}

msgEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!busy)send();}});
msgEl.addEventListener('input',()=>{msgEl.style.height='auto';msgEl.style.height=Math.min(msgEl.scrollHeight,150)+'px';});
function scrollB(){chatEl.scrollTo({top:chatEl.scrollHeight,behavior:'smooth'});}
function showErr(m){errs.innerHTML=`<div class="err-bar">${m}</div>`;setTimeout(()=>errs.innerHTML='',7000);}

function aiSVG(){
  const id='g'+Math.random().toString(36).slice(2,6);
  return`<svg viewBox="0 0 32 32" width="32" height="32" xmlns="http://www.w3.org/2000/svg" style="border-radius:50%">
    <defs>
      <radialGradient id="bg${id}" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#1a2f80"/><stop offset="100%" stop-color="#070a20"/></radialGradient>
      <radialGradient id="co${id}" cx="40%" cy="38%" r="60%"><stop offset="0%" stop-color="#b0ccff"/><stop offset="100%" stop-color="#3050cc"/></radialGradient>
    </defs>
    <circle cx="16" cy="16" r="16" fill="url(#bg${id})"/>
    <circle cx="16" cy="16" r="6" fill="#3060dd" opacity="0.5"/>
    <circle cx="16" cy="16" r="5" fill="url(#co${id})"/>
    <circle cx="16" cy="16" r="2.8" fill="#d0e4ff" opacity="0.9"/>
    <circle cx="16" cy="16" r="1.2" fill="white"/>
    <ellipse cx="16" cy="16" rx="11" ry="3.4" fill="none" stroke="#6080ff" stroke-width="0.8" opacity="0.55" transform="rotate(-30 16 16)"/>
    <circle cx="7" cy="9" r="0.9" fill="white" opacity="0.8"/>
    <circle cx="25" cy="7" r="0.6" fill="#c0d0ff" opacity="0.9"/>
    <circle cx="24" cy="24" r="0.7" fill="white" opacity="0.7"/>
  </svg>`;
}

function addBubble(text,type,animate=true){
  const row=document.createElement('div');row.className=`msg ${type}`;
  if(!animate)row.style.animation='none';
  const av=document.createElement('div');av.className=`av ${type}`;
  if(type==='ai'){av.innerHTML=aiSVG();}else{av.textContent='U';}
  const bub=document.createElement('div');bub.className='bubble';
  bub.innerHTML=fmt(text);
  row.appendChild(av);row.appendChild(bub);
  chatEl.appendChild(row);scrollB();
  return bub;
}

function addWeatherCard(data){
  const card=document.createElement('div');card.className='weather-card';
  const icon=data.desc.toLowerCase().includes('sun')||data.desc.toLowerCase().includes('clear')?'☀️':
    data.desc.toLowerCase().includes('cloud')?'⛅':
    data.desc.toLowerCase().includes('rain')||data.desc.toLowerCase().includes('drizzle')?'🌧️':
    data.desc.toLowerCase().includes('storm')?'⛈️':
    data.desc.toLowerCase().includes('snow')?'❄️':'🌤️';
  card.innerHTML=`
    <div class="weather-top">
      <div><div class="weather-city">${icon} ${data.city}</div><div class="weather-desc">${data.desc}</div></div>
      <div class="weather-temp">${data.temp_c}°C</div>
    </div>
    <div class="weather-grid">
      <div class="weather-stat"><div class="label">Feels Like</div><div class="val">${data.feels_c}°C</div></div>
      <div class="weather-stat"><div class="label">Humidity</div><div class="val">${data.humidity}%</div></div>
      <div class="weather-stat"><div class="label">Wind</div><div class="val">${data.wind_kmph} km/h</div></div>
      <div class="weather-stat"><div class="label">Temp °F</div><div class="val">${data.temp_f}°F</div></div>
      <div class="weather-stat"><div class="label">Visibility</div><div class="val">${data.visibility} km</div></div>
      <div class="weather-stat"><div class="label">Feels °F</div><div class="val">${data.feels_f}°F</div></div>
    </div>`;
  chatEl.appendChild(card);scrollB();
}

async function doGenerateImage(prompt){
  setBusy(true);
  const card=document.createElement('div');card.className='img-card';
  const wrap=document.createElement('div');wrap.className='img-wrap';
  wrap.innerHTML=`<div class="img-loading"><div class="img-spinner"></div><span>Generating your image…</span><span style="font-size:11px;opacity:.6">This takes 5–15 seconds</span></div>`;
  card.appendChild(wrap);
  chatEl.appendChild(card);scrollB();

  // Use Pollinations AI — completely free, no key needed
  const seed=Math.floor(Math.random()*99999);
  const enhancedPrompt=prompt+', high quality, detailed, 4k';
  const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?width=768&height=512&seed=${seed}&nologo=true`;

  const img=new Image();
  img.onload=()=>{
    wrap.innerHTML='';
    img.style.width='100%';
    img.style.display='block';
    img.style.borderRadius='var(--radius)';
    img.alt=prompt;
    wrap.appendChild(img);

    // Add meta bar with download
    const meta=document.createElement('div');meta.className='img-meta';
    meta.innerHTML=`
      <span class="img-prompt-text">🎨 ${prompt}</span>
      <div class="img-actions">
        <a class="img-btn" href="${url}" download="galaxy-ai-image.jpg" target="_blank">⬇ Save</a>
        <button class="img-btn" onclick="doGenerateImage(${JSON.stringify(prompt)})">🔄 Again</button>
      </div>`;
    card.appendChild(meta);
    scrollB();
    setBusy(false);
  };
  img.onerror=()=>{
    wrap.innerHTML=`<div class="img-loading"><span style="color:#f8a0a0">❌ Failed to generate. Try a different description.</span></div>`;
    setBusy(false);
  };
  img.src=url;

  history.push({role:'assistant',content:`I generated an image of: "${prompt}"`});
  localStorage.setItem(HIST,JSON.stringify(history.slice(-40)));
}

function fmt(raw){
  let s=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/### (.+)/g,'<h3>$1</h3>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  return s.split(/\n{2,}/).map(b=>{
    const t=b.trim();if(!t)return'';
    if(t.startsWith('<pre>')||t.startsWith('<h3>'))return t;
    if(/^[-*•] /.test(t))return'<ul>'+t.split('\n').filter(l=>/^[-*•] /.test(l)).map(l=>`<li>${l.replace(/^[-*•] /,'')}</li>`).join('')+'</ul>';
    if(/^\d+\. /.test(t))return'<ol>'+t.split('\n').filter(l=>/^\d+\. /.test(l)).map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>';
    return`<p>${t.replace(/\n/g,'<br>')}</p>`;
  }).join('');
}

function setBusy(v){
  busy=v;sendBtn.disabled=v;imgBtn.disabled=v;
  statusEl.style.background=v?'#f59e0b':'#22c55e';
  statusEl.style.boxShadow=v?'0 0 7px #f59e0b88':'0 0 7px #22c55e88';
}

async function send(){
  const txt=msgEl.value.trim();
  if(!txt||busy)return;
  errs.innerHTML='';
  document.getElementById('welcome')?.remove();
  msgEl.value='';msgEl.style.height='auto';

  // Image mode or image request detected
  if(imgMode||isImageRequest(txt)){
    addBubble(txt,'user');
    const prompt=imgMode?txt:extractImagePrompt(txt);
    history.push({role:'user',content:txt});
    if(imgMode){imgMode=false;modeBadge.textContent='💬 Chat';modeBadge.className='mode-badge';msgEl.placeholder='Chat, ask anything, or describe an image to generate…';ftNote.textContent='Galaxy AI · No limits · Always fast';imgBtn.style.borderColor='';imgBtn.style.color='';}
    doGenerateImage(prompt);
    return;
  }

  addBubble(txt,'user');
  history.push({role:'user',content:txt});
  setBusy(true);

  // Weather check
  if(isWeatherQuery(txt)){
    const city=extractCity(txt)||'Lagos';
    const typRow=document.createElement('div');typRow.className='msg ai';typRow.id='typ';
    typRow.innerHTML=`<div class="av ai">${aiSVG()}</div><div class="bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatEl.appendChild(typRow);scrollB();
    try{
      const wr=await fetch(`/weather?city=${encodeURIComponent(city)}`);
      const wd=await wr.json();
      document.getElementById('typ')?.remove();
      if(!wd.error){
        addWeatherCard(wd);
        history.push({role:'assistant',content:`Weather in ${city}: ${wd.temp_c}°C, ${wd.desc}, humidity ${wd.humidity}%, wind ${wd.wind_kmph} km/h.`});
        localStorage.setItem(HIST,JSON.stringify(history.slice(-40)));
        setBusy(false);return;
      }
    }catch(e){document.getElementById('typ')?.remove();}
  }

  // Regular chat
  const typRow=document.createElement('div');typRow.className='msg ai';typRow.id='typ';
  typRow.innerHTML=`<div class="av ai">${aiSVG()}</div><div class="bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatEl.appendChild(typRow);scrollB();

  try{
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history.map(m=>({role:m.role,content:m.content})),model:msel.value})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error||`Error ${res.status}`);}
    document.getElementById('typ')?.remove();
    const bub=addBubble('','ai');
    let full='';
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const d=line.slice(6).trim();
        if(d==='[DONE]')break;
        try{const j=JSON.parse(d);const token=j.choices?.[0]?.delta?.content;if(token){full+=token;bub.innerHTML=fmt(full);scrollB();}}catch(e){}
      }
    }
    history.push({role:'assistant',content:full});
    localStorage.setItem(HIST,JSON.stringify(history.slice(-40)));
  }catch(err){
    document.getElementById('typ')?.remove();history.pop();
    showErr(`Error: ${err.message}`);
  }
  setBusy(false);
}
init();
</script>
